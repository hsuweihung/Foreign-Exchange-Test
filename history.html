<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>成長趨勢分析</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --ink: #1a1208; --paper: #f5f0e8; --gold: #b8860b; --border: #c8b99a; --red: #8b2020; --green: #1a4a2e; }
        * { box-sizing: border-box; }
        body { background: var(--paper); padding: calc(20px + env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom)); font-family: 'Noto Serif TC', serif; color: var(--ink); }
        .container { max-width: 800px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .clear-btn { background: transparent; border: none; color: #999; cursor: pointer; font-size: 13px; text-decoration: underline; }
        .home-btn { text-decoration: none; color: var(--ink); border: 1.5px solid var(--ink); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .chart-container { background: white; padding: 25px 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f8f8f8; }
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; } thead { display: none; }
            tr { border-bottom: 1.5px solid #eee; padding: 10px 0; }
            td { padding-left: 45% !important; position: relative; text-align: right; font-size: 14px; }
            td:before { content: attr(data-label); position: absolute; left: 15px; font-weight: bold; color: var(--gold); font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 style="margin:0; font-size:24px;">成長趨勢</h1>
            <div style="display:flex; gap:15px; align-items:center;">
                <button class="clear-btn" onclick="clearAll()">清除所有紀錄</button>
                <a href="index.html" class="home-btn">回首頁</a>
            </div>
        </header>
        <div id="main-content" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card"><small style="color:var(--gold); letter-spacing:1px;">TOP SCORE</small><div style="font-size:28px; font-weight:bold; font-family:'DM Mono';" id="top-score">0</div></div>
                <div class="stat-card"><small style="color:var(--gold); letter-spacing:1px;">AVERAGE</small><div style="font-size:28px; font-weight:bold; font-family:'DM Mono'; color:var(--green);" id="avg-rate">0%</div></div>
            </div>
            <div class="chart-container"><canvas id="scoreChart" height="200"></canvas></div>
            <div id="history-table-wrap"></div>
        </div>
        <div id="empty-state" style="text-align:center; padding:100px 20px; color:#bbb;">目前尚無測驗紀錄</div>
    </div>
    <script>
        window.onload = function() {
            const hist = JSON.parse(localStorage.getItem('exam_history') || '[]');
            if (hist.length > 0) {
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('empty-state').style.display = 'none';
                const scores = hist.map(h => h.score);
                document.getElementById('top-score').textContent = Math.max(...scores);
                const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
                document.getElementById('avg-rate').textContent = Math.round(avg) + '%';
                renderTable(hist); renderChart(hist);
            }
        };
        function renderTable(hist) {
            let html = '<table><thead><tr><th>日期</th><th>科目</th><th>得分</th></tr></thead><tbody>';
            hist.forEach(h => { html += `<tr><td data-label="日期">${h.timestamp.split(' ')[0]}</td><td data-label="科目">${h.subject}</td><td data-label="得分" style="font-weight:bold; color:${h.score >= 70 ? 'var(--green)' : 'var(--red)'}">${h.score}</td></tr>`; });
            document.getElementById('history-table-wrap').innerHTML = html + '</tbody></table>';
        }
        function renderChart(hist) {
            const logs = [...hist].reverse().slice(-10);
            new Chart(document.getElementById('scoreChart').getContext('2d'), {
                type: 'line',
                data: { labels: logs.map(l => l.timestamp.split(' ')[0].slice(5)), datasets: [{ label: '得分', data: logs.map(l => l.score), borderColor: '#b8860b', backgroundColor: 'rgba(184,134,11,0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
            });
        }
        function clearAll() { if (confirm('確定要清除所有紀錄嗎？此動作無法恢復。')) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
