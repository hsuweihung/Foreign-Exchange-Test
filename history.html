<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>初階外匯考古題練習網站 - 作答紀錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js"></script>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/history.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1 class="page-heading">作答紀錄</h1>
                <div class="header-actions">
                    <button class="clear-btn" id="clear-history-btn" type="button">清空紀錄</button>
                    <a href="index.html" class="home-btn">
                        <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 3l9 8h-3v10h-5v-6H11v6H6V11H3l9-8z"></path>
                        </svg>
                        回首頁
                    </a>
                </div>
            </div>
        </header>

        <div id="main-content" class="hidden">
            <div class="tab-group">
                <button class="tab active" data-tab="exchange" type="button">外匯匯款</button>
                <button class="tab" data-tab="trade" type="button">進出口外匯</button>
            </div>

            <div class="stat-card">
                <span class="stat-label" id="current-subject-label">外匯匯款最高分</span>
                <div class="stat-value" id="top-score">0</div>
            </div>

            <div class="chart-container">
                <canvas id="scoreChart"></canvas>
            </div>

            <button class="analyze-btn" id="analyze-weakness-btn" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" fill="#4285f4"/></svg>
                請 Gemini 分析弱點
            </button>

            <div class="table-wrap">
                <table>
                    <thead><tr><th>日期</th><th>模式 / 年度</th><th>分數</th><th>結果</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>

        <div id="empty-state">目前還沒有作答紀錄。</div>
    </div>

    <div id="gemini-drawer">
        <div class="drawer-inner">
            <div class="drawer-header">
                <div class="drawer-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" fill="#4285f4"/></svg>
                    Gemini 弱點分析
                </div>
                <button class="drawer-close" id="close-drawer-btn" type="button" aria-label="關閉 Gemini 弱點分析">×</button>
            </div>
            <div class="chat-body" id="chat-body"></div>
            <div class="chat-input-row">
                <input class="chat-input" id="chat-input" placeholder="想追問成績趨勢或錯題原因都可以" />
                <button class="chat-send" id="chat-send" type="button">送出</button>
            </div>
        </div>
    </div>

    <script src="assets/js/constants.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/history.js"></script>
</body>
</html>
