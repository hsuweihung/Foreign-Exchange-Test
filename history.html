<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>成長趨勢分析</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js"></script>
    <style>
        :root { --ink: #1a1208; --paper: #f5f0e8; --gold: #b8860b; --border: #c8b99a; --red: #8b2020; --green: #1a4a2e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--paper); padding: calc(20px + env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom)); font-family: 'Noto Serif TC', serif; color: var(--ink); }
        .container { max-width: 800px; margin: 0 auto; }
        header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .clear-btn { background: transparent; border: 1px solid #ddd; color: #999; cursor: pointer; font-size: 11px; padding: 4px 8px; border-radius: 4px; transition: 0.2s; }
        .clear-btn:hover { border-color: var(--red); color: var(--red); background: #fff5f5; }
        .home-btn { text-decoration: none; color: var(--ink); border: 1.5px solid var(--ink); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .tab-group { display: flex; background: rgba(0,0,0,0.05); padding: 4px; border-radius: 10px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; cursor: pointer; border-radius: 8px; transition: 0.2s; font-weight: bold; color: #888; }
        .tab.active { background: white; color: var(--ink); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; }
        .stat-label { font-size: 11px; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; display: block; font-weight: bold; }
        .stat-value { font-size: 42px; font-weight: bold; font-family: 'DM Mono'; line-height: 1; }
        .chart-container { background: white; padding: 20px 10px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 16px; height: 300px; position: relative; }
        .analyze-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; margin-bottom: 16px; background: white; color: #4285f4; border: 1.5px solid #4285f4; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; font-family: 'Noto Serif TC', serif; transition: 0.2s; }
        .analyze-btn:hover { background: #f0f4ff; transform: translateY(-1px); }
        .table-wrap { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fafafa; padding: 12px 15px; text-align: left; font-size: 12px; color: var(--gold); border-bottom: 1px solid #eee; }
        td { padding: 12px 15px; border-bottom: 1px solid #f8f8f8; font-size: 14px; }
        #empty-state { text-align: center; padding: 100px 20px; color: #bbb; }
        #gemini-drawer { position: fixed; bottom: 0; left: 0; width: 100%; height: 0; background: white; border-top: 2px solid #4285f4; border-radius: 16px 16px 0 0; z-index: 600; transition: height 0.35s cubic-bezier(0.4,0,0.2,1); overflow: hidden; box-shadow: 0 -8px 30px rgba(0,0,0,0.12); }
        #gemini-drawer.open { height: 75vh; }
        .drawer-inner { display: flex; flex-direction: column; height: 100%; }
        .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .drawer-title { font-size: 14px; font-weight: bold; color: #4285f4; display: flex; align-items: center; gap: 6px; }
        .drawer-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #999; padding: 0 4px; line-height: 1; }
        .chat-body { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
        .msg-gemini { align-self: flex-start; background: #f8f8f8; color: var(--ink); padding: 14px 16px; border-radius: 2px 12px 12px 12px; font-size: 14px; max-width: 100%; line-height: 1.8; border: 1px solid #eee; white-space: pre-wrap; }
        .msg-user { align-self: flex-end; background: #4285f4; color: white; padding: 10px 14px; border-radius: 12px 12px 2px 12px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .msg-loading { color: #4285f4; font-size: 13px; display: flex; align-items: center; gap: 6px; padding: 8px 0; }
        .dot-bounce { display: inline-flex; gap: 4px; }
        .dot-bounce span { width: 6px; height: 6px; background: #4285f4; border-radius: 50%; animation: bounce 1.2s infinite; }
        .dot-bounce span:nth-child(2) { animation-delay: 0.2s; }
        .dot-bounce span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
        .chat-input-row { display: flex; gap: 8px; padding: 10px 18px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid #eee; flex-shrink: 0; }
        .chat-input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; font-family: 'Noto Serif TC', serif; outline: none; }
        .chat-input:focus { border-color: #4285f4; }
        .chat-send { padding: 10px 16px; background: #4285f4; color: white; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1 style="margin:0; font-size:22px;">趨勢報告</h1>
                <div class="header-actions">
                    <button class="clear-btn" onclick="clearAll()">清除數據</button>
                    <a href="index.html" class="home-btn">回首頁</a>
                </div>
            </div>
        </header>

        <div id="main-content" style="display:none;">
            <div class="tab-group">
                <div class="tab active" onclick="switchTab('exchange')">國外匯兌</div>
                <div class="tab" onclick="switchTab('trade')">進出口外匯</div>
            </div>

            <div class="stat-card">
                <span class="stat-label" id="current-subject-label">國外匯兌最高分</span>
                <div class="stat-value" id="top-score">0</div>
            </div>

            <div class="chart-container">
                <canvas id="scoreChart"></canvas>
            </div>

            <button class="analyze-btn" onclick="analyzeWeakness()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" fill="#4285f4"/></svg>
                請 Gemini 分析我的弱點
            </button>

            <div class="table-wrap">
                <table>
                    <thead><tr><th>日期</th><th>屆別</th><th>得分</th><th>狀態</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>

        <div id="empty-state">暫無紀錄</div>
    </div>

    <div id="gemini-drawer">
        <div class="drawer-inner">
            <div class="drawer-header">
                <div class="drawer-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" fill="#4285f4"/></svg>
                    Gemini 弱點分析
                </div>
                <button class="drawer-close" onclick="closeDrawer()">✕</button>
            </div>
            <div class="chat-body" id="chat-body"></div>
            <div class="chat-input-row">
                <input class="chat-input" id="chat-input" placeholder="繼續追問，例如：這些概念要怎麼記？" onkeydown="if(event.key==='Enter')sendChat()" />
                <button class="chat-send" id="chat-send" onclick="sendChat()">送出</button>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;
        let currentTab = 'exchange';
        let fullHistory = [];

        const chartLimitLinePlugin = {
            id: 'chartLimitLine',
            afterDraw(chart, args, options) {
                const { ctx, chartArea: { left, right, top, bottom }, scales: { y } } = chart;
                if (!options.value) return;
                const yValue = y.getPixelForValue(options.value);
                if (yValue < top || yValue > bottom) return;
                ctx.save();
                ctx.beginPath();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = '#8b2020';
                ctx.setLineDash([6, 4]);
                ctx.moveTo(left, yValue);
                ctx.lineTo(right, yValue);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.font = 'bold 11px Noto Serif TC, serif';
                ctx.fillStyle = '#8b2020';
                ctx.textAlign = 'right';
                ctx.fillText(options.label || '及格線', right, yValue - 5);
                ctx.restore();
            }
        };
        Chart.register(chartLimitLinePlugin);

        window.onload = function() {
            fullHistory = JSON.parse(localStorage.getItem('exam_history') || '[]');
            if (fullHistory.length > 0) {
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('empty-state').style.display = 'none';
                renderPage();
            }
        };

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'exchange') || (i === 1 && tab === 'trade'));
            });
            renderPage();
        }

        function renderPage() {
            const filterKey = currentTab === 'exchange' ? '國外匯兌' : '進出口';
            const filteredData = fullHistory.filter(h => h.subject.includes(filterKey));
            document.getElementById('current-subject-label').textContent = `${filterKey}最高分`;
            const scores = filteredData.map(h => h.score);
            document.getElementById('top-score').textContent = scores.length > 0 ? Math.max(...scores) : 0;
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = filteredData.length > 0 ? filteredData.map(h => {
                const sessionLabel = !h.session || h.session === 'all' ? '模擬考' : `第 ${h.session} 屆`;
                return `<tr>
                    <td>${h.timestamp.split(' ')[0].slice(5)}</td>
                    <td style="font-size:12px; color:#888;">${sessionLabel}</td>
                    <td style="font-family:'DM Mono'; font-weight:bold;">${h.score}</td>
                    <td style="color:${h.score >= 70 ? 'var(--green)' : 'var(--red)'}">${h.score >= 70 ? '合格' : '待加強'}</td>
                </tr>`;
            }).join('') : '<tr><td colspan="4" style="text-align:center; color:#ccc; padding:20px;">無此科目紀錄</td></tr>';
            renderChart(filteredData);
        }

        function renderChart(data) {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            if (myChart) myChart.destroy();
            const chartData = [...data].reverse();
            const color = currentTab === 'exchange' ? '#b8860b' : '#2a5a8a';
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map(d => d.timestamp.split(' ')[0].slice(5)),
                    datasets: [{ data: chartData.map(d => d.score), borderColor: color, backgroundColor: color + '15', fill: true, tension: 0.4, pointRadius: 5, pointBackgroundColor: 'white' }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: '#eee' }, ticks: { font: { family: 'DM Mono' } } },
                        x: { grid: { display: false }, ticks: { font: { family: 'DM Mono', size: 10 } } }
                    },
                    plugins: { legend: { display: false }, chartLimitLine: { value: 70, label: '🏁 及格 70' } }
                }
            });
        }

        function clearAll() {
            if (confirm('確定要清除所有紀錄嗎？')) {
                localStorage.removeItem('exam_history');
                location.reload();
            }
        }

        // ── Gemini 弱點分析 ───────────────────────────────────
        const WORKER_URL = 'https://emini-proxy.19970923william.workers.dev';
        let geminiHistory = [];
        let geminiLoading = false;

        function buildWeaknessPrompt() {
            const mistakes = JSON.parse(localStorage.getItem('mistake_bank') || '{}');
            const subKey = currentTab === 'exchange' ? 'remittance' : 'trade';
            const subName = currentTab === 'exchange' ? '國外匯兌業務' : '進出口外匯業務';
            const refs = mistakes[subKey] || [];
            if (refs.length === 0) return null;
            const wrongTexts = [];
            refs.forEach(ref => {
                if (typeof DATA !== 'undefined' && DATA[subKey]?.[ref.session]) {
                    const q = DATA[subKey][ref.session].find(q => String(q.id) === String(ref.id));
                    if (q) wrongTexts.push(`- 第${ref.session}屆 題${q.id}：${q.text}`);
                }
            });
            if (wrongTexts.length === 0) return null;
            return `我正在準備台灣初階外匯人員考試的「${subName}」科目。以下是我曾經答錯的題目：\n\n${wrongTexts.join('\n')}\n\n請分析：\n1. 我在哪些概念或法規上最容易出錯？\n2. 這些錯誤反映了哪些知識盲點？\n3. 給我具體的複習建議和重點提示。\n請用繁體中文回答，條列清晰。`;
        }

        async function analyzeWeakness() {
            const prompt = buildWeaknessPrompt();
            if (!prompt) { alert('目前沒有錯題紀錄，多做幾次練習後再來分析！'); return; }
            document.getElementById('gemini-drawer').classList.add('open');
            document.getElementById('chat-body').innerHTML = '';
            geminiHistory = [];
            await callGemini(prompt);
        }

        function closeDrawer() { document.getElementById('gemini-drawer').classList.remove('open'); }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || geminiLoading) return;
            input.value = '';
            appendMsg('user', text);
            await callGemini(text);
        }

        function appendMsg(role, text) {
            const body = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'msg-user' : 'msg-gemini';
            div.textContent = text;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
        }

        function appendLoading() {
            const body = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = 'msg-loading';
            div.innerHTML = `<div class="dot-bounce"><span></span><span></span><span></span></div> Gemini 分析中`;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
            return div;
        }

        async function callGemini(userText) {
            geminiLoading = true;
            document.getElementById('chat-send').disabled = true;
            document.getElementById('chat-input').disabled = true;
            geminiHistory.push({ role: 'user', parts: [{ text: userText }] });
            const loader = appendLoading();
            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: geminiHistory.filter(h => h.role && h.parts), generationConfig: { temperature: 0.3, maxOutputTokens: 2048 } })
                });
                const data = await res.json();
                loader.remove();
                if (data.error) {
                    appendMsg('gemini', `⚠️ 錯誤：${data.error.message}`);
                    geminiHistory.pop();
                } else {
                    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '（無回應）';
                    geminiHistory.push({ role: 'model', parts: [{ text: reply }] });
                    typewriterMsg(reply);
                }
            } catch (e) {
                loader.remove();
                appendMsg('gemini', `⚠️ 網路錯誤：${e.message}`);
                geminiHistory.pop();
            }
            geminiLoading = false;
            document.getElementById('chat-send').disabled = false;
            document.getElementById('chat-input').disabled = false;
            document.getElementById('chat-input').focus();
        }

        function typewriterMsg(text) {
            const body = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = 'msg-gemini';
            body.appendChild(div);
            let i = 0;
            const speed = Math.max(1, Math.floor(text.length / 120));
            const interval = setInterval(() => {
                i += speed;
                div.textContent = text.slice(0, i);
                body.scrollTop = body.scrollHeight;
                if (i >= text.length) { div.textContent = text; clearInterval(interval); }
            }, 16);
        }
    </script>
</body>
</html>
