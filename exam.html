<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>初階外匯考古題練習網站 - 作答頁</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/exam.css">
</head>
<body>
    <div class="progress-container"><div id="progress-bar"></div></div>

    <div id="nav-modal">
        <div class="modal-content">
            <button class="modal-close" id="nav-modal-close" type="button" aria-label="關閉題目地圖">×</button>
            <h3 class="modal-title">題目地圖</h3>
            <div id="nav-grid" class="nav-grid"></div>
        </div>
    </div>

    <header>
        <div class="header-inner">
            <div class="header-left">
                <button class="home-icon" id="go-home-btn" type="button">← <span>HOME</span></button>
            </div>
            <div class="header-center">
                <div class="status-val" id="header-title">載入中</div>
                <div class="status-progress" id="stat-answered">0 / 0</div>
            </div>
            <div class="header-right">
                <button class="finish-btn" id="finish-btn" type="button">交卷</button>
            </div>
        </div>
    </header>

    <main>
        <div class="question-card">
            <div class="card-top">
                <div id="q-meta" class="q-meta">--</div>
                <div class="card-actions">
                    <button class="redo-btn" id="reset-current-btn" type="button">重答</button>
                    <button class="bookmark-btn" id="bookmark-btn" type="button">收藏</button>
                    <button class="ask-gemini-btn" id="ask-gemini-btn" type="button">問 Gemini</button>
                </div>
            </div>
            <div id="q-text" class="q-text">題目載入中...</div>
            <div id="options-grid" class="options-grid"></div>
            <div id="analysis-info" class="analysis-box"></div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="nav-group">
                <button id="prev-btn" class="nav-btn" type="button">上一題</button>
                <button id="nav-pos-btn" type="button">0 / 0</button>
                <button id="next-btn" class="nav-btn" type="button">下一題</button>
            </div>
        </div>
    </footer>

    <div id="gemini-drawer">
        <div class="drawer-inner">
            <div class="drawer-header">
                <div class="drawer-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" fill="#4285f4"/></svg>
                    Gemini 題目解析
                </div>
                <button class="drawer-close" id="close-gemini-btn" type="button" aria-label="關閉 Gemini 題目解析">×</button>
            </div>
            <div class="chat-body" id="chat-body"></div>
            <div class="chat-input-row">
                <input class="chat-input" id="chat-input" placeholder="想追問哪個觀念都可以直接輸入" />
                <button class="chat-send" id="chat-send" type="button">送出</button>
            </div>
        </div>
    </div>

    <script src="assets/js/constants.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/exam/core.js"></script>
    <script src="assets/js/exam/render.js"></script>
    <script src="assets/js/exam/gemini.js"></script>
    <script src="assets/js/exam/app.js"></script>
</body>
</html>
