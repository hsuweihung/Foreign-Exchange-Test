<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>初階外匯考古題練習網站 - 收藏題目</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/saved.css">
</head>
<body>
<div class="container">
    <header>
        <h1 class="page-title">收藏題目</h1>
        <div class="header-actions">
            <button class="clear-btn" id="clear-current-tab-btn" type="button">清空目前科目</button>
            <a href="index.html" class="home-btn">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3l9 8h-3v10h-5v-6H11v6H6V11H3l9-8z"></path>
                </svg>
                回首頁
            </a>
        </div>
    </header>

    <div class="tab-group">
        <button class="tab active" id="tab-remittance" data-tab="remittance" type="button">
            國外匯兌 <span class="tab-badge" id="badge-remittance">0</span>
        </button>
        <button class="tab" id="tab-trade" data-tab="trade" type="button">
            進出口外匯 <span class="tab-badge" id="badge-trade">0</span>
        </button>
    </div>

    <div class="stat-row">
        <div class="stat-mini">
            <span>國外匯兌</span>
            <b id="count-remittance">0</b>
        </div>
        <div class="stat-mini">
            <span>進出口外匯</span>
            <b id="count-trade">0</b>
        </div>
        <div class="stat-mini">
            <span>總數</span>
            <b id="count-total">0</b>
        </div>
    </div>

    <div id="question-list"></div>

    <div id="empty-state">
        <div class="emoji">☆</div>
        <p>目前還沒有收藏題目。</p>
        <small>在作答頁按下收藏後，這裡就會幫你集中整理。</small>
    </div>
</div>

<div class="practice-bar" id="practice-bar">
    <div class="practice-bar-inner">
        <button class="practice-btn" id="start-practice-btn" type="button">開始練習收藏題目</button>
    </div>
</div>

<div id="gemini-drawer">
    <div class="drawer-inner">
        <div class="drawer-header">
            <div class="drawer-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" fill="#4285f4"/></svg>
                Gemini 題目解析
            </div>
            <button class="drawer-close" id="close-gemini-btn" type="button" aria-label="關閉 Gemini 題目解析">×</button>
        </div>
        <div class="chat-body" id="chat-body"></div>
        <div class="chat-input-row">
            <input class="chat-input" id="chat-input" placeholder="想追問哪個概念可以直接輸入" />
            <button class="chat-send" id="chat-send" type="button">送出</button>
        </div>
    </div>
</div>

<script src="assets/js/constants.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/common.js"></script>
<script src="assets/js/saved.js"></script>
</body>
</html>
