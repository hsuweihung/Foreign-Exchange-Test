<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>初階外匯考古題練習網站 - 作答結果</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:wght@700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/result.css">
</head>
<body>
    <div class="result-card">
        <h2>TEST REPORT</h2>
        <div class="score-wrap">
            <small class="score-label">FINAL SCORE</small>
            <div class="score" id="score-val">0</div>
        </div>
        <div class="detail-box">
            <div class="detail-item"><b id="res-correct" class="correct-count">0</b><small>答對題數</small></div>
            <div class="detail-item detail-item-divider"><b id="res-total">0</b><small>總題數</small></div>
        </div>
    </div>

    <div class="btn-group">
        <a href="index.html" class="btn">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3l9 8h-3v10h-5v-6H11v6H6V11H3l9-8z"></path>
            </svg>
            返回首頁
        </a>
        <a href="history.html" class="btn btn-outline">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14l4-4h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 10H6.2L5 14.2V5h14v8z"></path>
            </svg>
            查看作答紀錄
        </a>
    </div>

    <div id="gemini-recommend">
        <div class="recommend-card">
            <div class="recommend-title">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2L9.5 9.5L2 12L9.5 14.5L12 22L14.5 14.5L22 12L14.5 9.5L12 2Z" fill="#4285f4"/></svg>
                Gemini 練習建議
            </div>
            <div class="recommend-body" id="recommend-body">
                <span class="recommend-loading">
                    <span class="dot-bounce"><span></span><span></span><span></span></span> 正在整理你的弱點與建議...
                </span>
            </div>
        </div>
    </div>

    <div id="wrong-section" class="hidden">
        <div class="wrong-title">錯題整理</div>
        <div id="wrong-list"></div>
    </div>

    <script src="assets/js/constants.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/result.js"></script>
</body>
</html>
