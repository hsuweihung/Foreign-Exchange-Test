<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>測驗結果</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:wght@700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ink: #1a1208; --paper: #f5f0e8; --gold: #b8860b; --border: #c8b99a;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--paper); 
            margin: 0; 
            font-family: 'Noto Serif TC', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            /* 針對手機橫向與直向的內距優化 */
            padding: 20px 20px calc(20px + var(--safe-bottom));
        }

        .result-card { 
            background: white; 
            padding: clamp(30px, 8vw, 60px); /* 寬度越大，內距越大 */
            text-align: center; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            border-radius: 8px; 
            width: 100%;
            max-width: 480px; /* iPad 以上維持這個寬度 */
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--gold); 
            letter-spacing: 4px; 
            font-size: 1.2rem;
            margin: 0;
        }

        .score-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .score { 
            /* 使用 clamp 讓分數在手機不會溢出，在桌機夠大 */
            font-size: clamp(60px, 20vw, 100px); 
            font-weight: bold; 
            margin: 10px 0; 
            color: var(--ink);
            line-height: 1;
            font-family: 'DM Mono', monospace;
        }

        .detail-box { 
            display: flex; 
            justify-content: space-around; 
            margin: 30px 0; 
            border-top: 1px solid #eee; 
            border-bottom: 1px solid #eee;
            padding: 20px 0;
        }

        .detail-item { flex: 1; }
        .detail-val { 
            font-size: 1.8rem; 
            font-weight: bold; 
            font-family: 'DM Mono', monospace;
        }
        .detail-label { 
            font-size: 0.8rem; 
            color: #999; 
            margin-top: 5px;
            display: block;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn { 
            background: var(--ink); 
            color: white; 
            padding: 16px 20px; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
            display: block;
        }

        .btn-outline {
            background: transparent;
            color: var(--ink);
            border: 1.5px solid var(--ink);
        }

        .btn:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: white;
        }

        /* 手機極小螢幕優化 (例如 iPhone SE) */
        @media (max-width: 320px) {
            .result-card { padding: 20px; }
            .score { font-size: 50px; }
        }
    </style>
</head>
<body>
    <div class="result-card">
        <h2>REPORT</h2>
        <p class="score-label">OVERALL SCORE</p>
        <div class="score" id="score-val">0</div>
        
        <div class="detail-box">
            <div class="detail-item">
                <div class="detail-val" id="res-correct" style="color: #1a4a2e;">0</div>
                <span class="detail-label">答對題數</span>
            </div>
            <div class="detail-item" style="border-left: 1px solid #eee;">
                <div class="detail-val" id="res-total">0</div>
                <span class="detail-label">總題數</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn">重新開始測驗</a>
            <a href="history.html" class="btn btn-outline">查看成長趨勢表</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const data = JSON.parse(localStorage.getItem('last_result'));
            if (!data) {
                location.href = 'index.html';
                return;
            }

            // 分數動態跑跳效果 (微交互)
            let currentScore = 0;
            const targetScore = data.score;
            const timer = setInterval(() => {
                if (currentScore >= targetScore) {
                    document.getElementById('score-val').textContent = targetScore;
                    clearInterval(timer);
                } else {
                    currentScore += Math.ceil(targetScore / 20);
                    if (currentScore > targetScore) currentScore = targetScore;
                    document.getElementById('score-val').textContent = currentScore;
                }
            }, 30);

            document.getElementById('res-correct').textContent = data.correct;
            document.getElementById('res-total').textContent = data.total;
        };
    </script>
</body>
</html>
