<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>初階外匯考古題練習網站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
<div class="container">
    <h1>初階外匯考古題練習網站</h1>
    <div class="sub">適用第 44-46 屆外匯測驗題庫</div>

    <div class="selection-box">
        <span class="label">SESSION</span>
        <div class="pill-group" id="session-group">
            <div class="pill active" data-val="44">第 44 屆</div>
            <div class="pill" data-val="45">第 45 屆</div>
            <div class="pill" data-val="46">第 46 屆</div>
            <div class="pill" data-val="all">全部年度混合題庫</div>
        </div>
    </div>

    <div class="selection-box">
        <span class="label">SUBJECT</span>
        <div class="pill-group" id="subject-group">
            <div class="pill active" data-val="remittance">外匯匯款</div>
            <div class="pill" data-val="trade">進出口外匯</div>
        </div>
    </div>

    <div class="selection-box">
        <span class="label">MODE</span>
        <div class="pill-group" id="mode-group">
            <div class="pill active" data-val="practice">練習模式</div>
            <div class="pill" data-val="exam">測驗模式</div>
        </div>
    </div>

    <button class="start-btn" id="start-btn" type="button">開始作答 START</button>

    <a href="history.html" class="history-btn">
        <svg width="16" height="16" viewBox="0 0 24 24">
            <path d="M13 3v6h8V3h-8zm6 4h-4V5h4v2zm-6 4v10h8V11h-8zm6 8h-4v-6h4v6zm-16 0h8v-6H3v6zm2-4h4v2H5v-2zm-2-10v10h8V3H3zm6 4H5V5h4v2z"/>
        </svg>
        查看作答紀錄
    </a>

    <a href="saved.html" class="history-btn history-btn-accent">
        <svg width="16" height="16" viewBox="0 0 24 24">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
        </svg>
        查看收藏題目
    </a>
</div>
<script src="assets/js/constants.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/common.js"></script>
<script src="assets/js/index.js"></script>
</body>
</html>
